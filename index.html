<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wallpaper Dashboard</title>

  <link rel="manifest" href="manifest.json" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: url('file_00000000e62071fab031ced594acfd61.png') no-repeat center center/cover;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      color: white;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .info {
      position: relative;
      z-index: 2;
      padding: 24px;
    }

    .time {
      font-size: 48px;
      font-weight: 600;
    }

    .date {
      font-size: 18px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .battery {
      font-size: 14px;
      margin-top: 6px;
      opacity: 0.8;
    }

    @media (orientation: portrait) {
      body {
        align-items: center;
        justify-content: center;
      }

      .info {
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="info">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
    <div class="battery" id="battery">Battery: --%</div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      const time = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });

      const date = now.toLocaleDateString([], {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      });

      document.getElementById("time").textContent = time;
      document.getElementById("date").textContent = date;
    }

    setInterval(updateTime, 1000);
    updateTime();

    async function updateBattery() {
      if ('getBattery' in navigator) {
        const battery = await navigator.getBattery();

        function setBattery() {
          const level = Math.round(battery.level * 100);
          document.getElementById("battery").textContent = "Battery: " + level + "%";
        }

        setBattery();

        battery.addEventListener('levelchange', setBattery);
      } else {
        document.getElementById("battery").textContent = "Battery: Not supported";
      }
    }

    updateBattery();

    if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Note: The scope must include the subfolder name
    const scope = '/repository-name/';
    
    navigator.serviceWorker.register('/repository-name/sw.js', { scope: scope })
      .then((registration) => {
        console.log('ServiceWorker registered with scope:', registration.scope);
      })
      .catch((error) => {
        console.error('ServiceWorker registration failed:', error);
      });
  });
    }
  </script>

</body>
</html>
