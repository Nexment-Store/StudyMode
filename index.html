<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Clock</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Background -->
  <div id="bg"></div>

  <!-- Gradient overlay - bottom left darkening -->
  <div class="overlay"></div>

  <!-- Clock + Date -->
  <div class="clock-wrap" id="clockWrap" title="Double-click to set countdown">
    <div class="time" id="timeDisplay">00:00</div>
    <div class="date" id="dateDisplay">Thursday, Apr 16</div>
  </div>

  <!-- Timer Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="timerModal">
      <button class="close-btn" id="closeModal">&#x2715;</button>
      <h2 class="modal-title">Set Countdown</h2>
      <div class="time-inputs">
        <div class="input-group">
          <button class="stepper" data-target="hrInput" data-dir="up">&#9650;</button>
          <input type="number" id="hrInput" min="0" max="23" value="0" />
          <button class="stepper" data-target="hrInput" data-dir="down">&#9660;</button>
          <span class="label">HR</span>
        </div>
        <div class="colon">:</div>
        <div class="input-group">
          <button class="stepper" data-target="minInput" data-dir="up">&#9650;</button>
          <input type="number" id="minInput" min="0" max="59" value="0" />
          <button class="stepper" data-target="minInput" data-dir="down">&#9660;</button>
          <span class="label">MIN</span>
        </div>
      </div>
      <button class="set-btn" id="setTimer">Set Timer</button>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
